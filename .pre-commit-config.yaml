repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.7.4
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files

  - repo: local
    hooks:
      - id: text-style
        name: Text style
        entry: python scripts/check_text_style.py
        language: system
        types: [text]
        pass_filenames: true

      - id: commit-msg-style
        name: Commit message style (no vague cleanup-only subjects)
        entry: python scripts/check_commit_msg.py
        language: system
        stages: [commit-msg]
